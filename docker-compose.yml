# Coolify-friendly compose stack for cam-travel.
#
# Coolify provides:
#   - public domains + auto HTTPS (Traefik) per service
#   - env var injection (set values in the Coolify UI; ${VAR} below substitutes)
#   - container networking
#
# So this file:
#   - has no published host ports (Coolify routes via its internal proxy)
#   - uses `expose:` to advertise the container port Coolify should route to
#   - reads every secret/url from environment vars (defined in Coolify)
#
# Build layout: a single root `Dockerfile` defines a shared `deps` stage plus
# one runtime `target:` per service. BuildKit materializes deps + source once
# and every service branches from there, so `bun install` runs a single time
# across the whole compose build.
#
# Two ways to use it:
#   1. Single "Docker Compose" deployment in Coolify pointing at this file.
#   2. Five separate Coolify "Application" deployments — each one points at
#      the root `Dockerfile` and sets its own `--target` (auth, graphql,
#      api-gateway, web, dashboard).

name: cam-travel

services:
  # --- data stores ----------------------------------------------------------
  # Bundled Redis on the same compose network as the backends. Consumers reach
  # it as `redis:6379`. Deploying Redis as a separate Coolify resource puts it
  # on a different Docker bridge — its internal hostname doesn't resolve from
  # the app containers, and falling back to the public IP NAT-hairpins through
  # Coolify's proxy, which silently drops idle TCP and surfaces as
  # "Command timed out" warnings on better-auth's session lookups.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # --- backend services -----------------------------------------------------
  auth:
    build:
      context: .
      dockerfile: Dockerfile
      target: auth
    environment:
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379/0
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      # BETTER_AUTH_URL must be the gateway's public URL, not auth's own
      # hostname. Browsers reach auth only via the gateway's /api/auth/**
      # proxy, so cookies and OAuth callback URLs must be computed against
      # the gateway domain or the browser will reject Set-Cookie / Google
      # will reject the redirect URI.
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Scopes the session cookie to a parent domain so the gateway and the
      # web/dashboard subdomains all see it. The auth service itself does
      # not need a public Coolify domain anymore — traffic comes in through
      # the gateway's internal /api/auth proxy.
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
    expose:
      - "3001"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  graphql:
    build:
      context: .
      dockerfile: Dockerfile
      target: graphql
    environment:
      PORT: "3002"
      GRAPHQL_TCP_HOST: "0.0.0.0"
      GRAPHQL_TCP_PORT: "4002"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      PUBLIC_API_URL: ${PUBLIC_API_URL}
    expose:
      - "3002"
      - "4002"
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_started
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-gateway
    environment:
      PORT: "3000"
      AUTH_SERVICE_URL: "http://auth:3001"
      GRAPHQL_HTTP_URL: "http://graphql:3002"
      GRAPHQL_TCP_HOST: "graphql"
      GRAPHQL_TCP_PORT: "4002"
      CORS_ORIGINS: ${CORS_ORIGINS}
      # The gateway runs its own better-auth instance for the AuthGuard, so
      # it needs the same DB/Redis + secret as the auth service. Without
      # these, AuthGuard.canActivate() hangs on Redis retries when a session
      # cookie is present (manifests as a "pending" /graphql/v1 request).
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379/0
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_started
      graphql:
        condition: service_started
      redis:
        condition: service_healthy

  # --- frontends ------------------------------------------------------------
  # VITE_* values are baked into the bundle at BUILD time via `args:` below.
  # In Coolify these come from variables flagged "Available at Buildtime".
  #
  # All browser traffic — including auth — goes through the api-gateway. So
  # VITE_AUTH_URL, VITE_API_URL, VITE_GRAPHQL_HTTP_URL should all point at
  # the gateway's public host (e.g. https://cam-travel-dev-api.rikrey.com).
  # The auth service has no public domain; only the gateway routes to it via
  # the /api/auth/** proxy on the Docker-internal network. AUTH_COOKIE_DOMAIN
  # remains useful because web/dashboard live on sibling subdomains and need
  # the session cookie visible on both their origin and the gateway's.
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        VITE_API_URL: ${WEB_VITE_API_URL}
        VITE_AUTH_URL: ${WEB_VITE_AUTH_URL}
        VITE_GRAPHQL_HTTP_URL: ${WEB_VITE_GRAPHQL_HTTP_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_PUBLIC_MAP_KEY: ${VITE_PUBLIC_MAP_KEY}
    expose:
      - "3000"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
      args:
        VITE_API_URL: ${DASH_VITE_API_URL}
        VITE_AUTH_URL: ${DASH_VITE_AUTH_URL}
        VITE_GRAPHQL_WS_URL: ${DASH_VITE_GRAPHQL_WS_URL}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
        VITE_GOOGLE_MAPS_ID: ${VITE_GOOGLE_MAPS_ID}
    expose:
      - "80"
    restart: unless-stopped

volumes:
  redis-data:
