# Coolify-friendly compose stack for cam-travel.
#
# Coolify provides:
#   - public domains + auto HTTPS (Traefik) per service
#   - env var injection (set values in the Coolify UI; ${VAR} below substitutes)
#   - container networking
#
# So this file:
#   - has no published host ports (Coolify routes via its internal proxy)
#   - uses `expose:` to advertise the container port Coolify should route to
#   - reads every secret/url from environment vars (defined in Coolify)
#
# Build layout: a single root `Dockerfile` defines a shared `deps` stage plus
# one runtime `target:` per service. BuildKit materializes deps + source once
# and every service branches from there, so `bun install` runs a single time
# across the whole compose build.
#
# Two ways to use it:
#   1. Single "Docker Compose" deployment in Coolify pointing at this file.
#   2. Five separate Coolify "Application" deployments — each one points at
#      the root `Dockerfile` and sets its own `--target` (auth, graphql,
#      api-gateway, web, dashboard).

name: cam-travel

services:
  # --- backend services -----------------------------------------------------
  # Redis is provided externally; backends connect via the REDIS_URL env var
  # (set in the Coolify UI to point at your existing Redis instance).
  cam-travel-auth:
    build:
      context: .
      dockerfile: Dockerfile
      target: auth
    environment:
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      # Auth's own public URL (e.g. https://auth.example.com). Browsers
      # call auth directly — frontends point VITE_AUTH_URL at this same
      # host. Going direct (not via the gateway proxy) avoids the
      # body-parser / proxy gesture that silently corrupted POST bodies.
      # The Google OAuth redirect URI is computed as
      # `${BETTER_AUTH_URL}/api/auth/callback/google` and must be
      # registered in Google Cloud Console for this exact URL.
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Scopes the session cookie to a parent domain so auth, gateway,
      # web, and dashboard subdomains all see it (e.g. ".example.com").
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
      # Bootstrap admin seed (SeedService runs on app start). If the user
      # already exists, it's promoted to admin instead of recreated.
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
    expose:
      - "3001"
    restart: unless-stopped

  cam-travel-graphql:
    build:
      context: .
      dockerfile: Dockerfile
      target: graphql
    environment:
      PORT: "3002"
      NODE_ENV: ${NODE_ENV:-production}
      GRAPHQL_TCP_HOST: "0.0.0.0"
      GRAPHQL_TCP_PORT: "4002"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      PUBLIC_API_URL: ${PUBLIC_API_URL}
    expose:
      - "3002"
      - "4002"
    restart: unless-stopped
    depends_on:
      cam-travel-auth:
        condition: service_started

  cam-travel-api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-gateway
    environment:
      PORT: "3000"
      AUTH_SERVICE_URL: "http://cam-travel-auth:3001"
      GRAPHQL_HTTP_URL: "http://cam-travel-graphql:3002"
      GRAPHQL_TCP_HOST: "cam-travel-graphql"
      GRAPHQL_TCP_PORT: "4002"
      CORS_ORIGINS: ${CORS_ORIGINS}
      # The gateway runs its own better-auth instance for the AuthGuard, so
      # it needs the same DB/Redis + secret as the auth service. Without
      # these, AuthGuard.canActivate() hangs on Redis retries when a session
      # cookie is present (manifests as a "pending" /graphql/v1 request).
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      cam-travel-auth:
        condition: service_started
      cam-travel-graphql:
        condition: service_started

  # --- frontends ------------------------------------------------------------
  # VITE_* values are baked into the bundle at BUILD time via `args:` below.
  # In Coolify these come from variables flagged "Available at Buildtime".
  #
  # Each backend service has its own public subdomain (Coolify routes via
  # SERVICE_FQDN_<svc>): VITE_API_URL → api-gateway, VITE_AUTH_URL → auth,
  # VITE_GRAPHQL_HTTP_URL → api-gateway's /graphql/v1 controller. The
  # browser hits each one directly. Auth used to sit behind the gateway's
  # /api/auth/** proxy, but NestJS's body parser silently consumed POST
  # bodies before the proxy could forward them — going direct sidesteps
  # that whole class of bugs.
  # AUTH_COOKIE_DOMAIN scopes the session cookie to the parent domain
  # (e.g. .example.com) so all subdomains see it.
  cam-travel-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        VITE_API_URL: ${WEB_VITE_API_URL}
        VITE_AUTH_URL: ${WEB_VITE_AUTH_URL}
        VITE_GRAPHQL_HTTP_URL: ${WEB_VITE_GRAPHQL_HTTP_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_PUBLIC_MAP_KEY: ${VITE_PUBLIC_MAP_KEY}
    expose:
      - "3000"
    restart: unless-stopped

  cam-travel-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
      args:
        VITE_API_URL: ${DASH_VITE_API_URL}
        VITE_AUTH_URL: ${DASH_VITE_AUTH_URL}
        VITE_GRAPHQL_WS_URL: ${DASH_VITE_GRAPHQL_WS_URL}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
        VITE_GOOGLE_MAPS_ID: ${VITE_GOOGLE_MAPS_ID}
        VITE_DEV_LOGIN_EMAIL: ${VITE_DEV_LOGIN_EMAIL:-}
        VITE_DEV_LOGIN_PASSWORD: ${VITE_DEV_LOGIN_PASSWORD:-}
    expose:
      - "80"
    restart: unless-stopped
